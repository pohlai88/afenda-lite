name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SHARED_ADMIN_EMAIL: ${{ secrets.SHARED_ADMIN_EMAIL }}
      SHARED_ADMIN_PASSWORD: ${{ secrets.SHARED_ADMIN_PASSWORD }}
      CLIENT_DEFAULT_PASSWORD: ${{ secrets.CLIENT_DEFAULT_PASSWORD }}
      SHARED_ADMIN_NAME: Portal Operator
      E2E_SURVEY_SLUG: ${{ secrets.E2E_SURVEY_SLUG }}
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Portal checks
        run: npm run checks

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Seed shared operator account
        run: npm run seed:admin

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm test
